<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и создание объявления</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Страница для входа -->
    <div id="loginPage">
        <h1>Вход в аккаунт</h1>
        <form id="loginForm">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required><br><br>

            <button type="submit">Войти</button>
        </form>
        <p id="loginMessage"></p>
    </div>

    <!-- Страница для создания объявления -->
    <div id="adCreatePage" style="display: none;">
        <h1>Создание объявления</h1>
        <form id="adForm" enctype="multipart/form-data">
            <label for="adName">Название объявления:</label>
            <input type="text" id="adName" name="adName" required><br><br>

            <label for="description">Описание:</label>
            <textarea id="description" name="description" required></textarea><br><br>

            <label for="price">Цена:</label>
            <input type="number" id="price" name="price" required><br><br>

            <!-- Выпадающий список для выбора региона -->
            <label for="regionId">Регион:</label>
            <select id="regionId" name="regionId" required>
                <option value="">Выберите регион</option>
            </select><br><br>

            <!-- Выпадающий список для выбора категории -->
            <label for="categoryId">Категория:</label>
            <select id="categoryId" name="categoryId" required>
                <option value="">Выберите категорию</option>
            </select><br><br>

            <!-- Выпадающий список для выбора подкатегории -->
            <label for="subcategoryId">Подкатегория:</label>
            <select id="subcategoryId" name="subcategoryId" required>
                <option value="">Выберите подкатегорию</option>
            </select><br><br>

            <label for="duration">Продолжительность (дни):</label>
            <input type="number" id="duration" name="duration" min="7" max="180" required><br><br>

            <label for="images">Изображения:</label>
            <input type="file" id="images" name="images" multiple accept="image/*" required><br><br>

            <button type="submit">Добавить объявление</button>
        </form>
        <p id="adMessage"></p>
        <button onclick="logout()">Выйти</button>
    </div>

    <script>
        // Проверка токена при загрузке страницы
window.onload = async function() {
    const token = localStorage.getItem('token');
    if (token) {
        showAdCreatePage();
        await populateRegionList();
        await populateCategoryList();
    } else {
        showLoginPage();
    }
};

// Показ страницы входа
function showLoginPage() {
    document.getElementById('loginPage').style.display = 'block';
    document.getElementById('adCreatePage').style.display = 'none';
}

// Показ страницы создания объявления
function showAdCreatePage() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adCreatePage').style.display = 'block';
}

// Обработчик отправки формы входа
document.getElementById('loginForm').addEventListener('submit', async function(event) {
    event.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('https://apsnybillboard-production.up.railway.app/api/user/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        if (response.ok) {
            localStorage.setItem('token', data.token);
            showAdCreatePage();
            await populateRegionList();
            await populateCategoryList();
            await populateSubcategoryList();
        } else {
            document.getElementById('loginMessage').textContent = data.message;
        }
    } catch (error) {
        document.getElementById('loginMessage').textContent = "Ошибка при входе";
        console.error(error);
    }
});

// Обработчик отправки формы объявления
document.getElementById('adForm').addEventListener('submit', async function(event) {
    event.preventDefault();

    const formData = new FormData(this);
    const token = localStorage.getItem('token');

    try {
        const response = await fetch('https://apsnybillboard-production.up.railway.app/api/ad', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`
            },
            body: formData
        });

        const data = await response.json();
        if (response.ok) {
            document.getElementById('adMessage').textContent = "Объявление успешно добавлено!";
            console.log(data);
        } else {
            document.getElementById('adMessage').textContent = "Ошибка: " ;
        }
    } catch (error) {
        document.getElementById('adMessage').textContent = `Ошибка: ${error.toString()}`;
        console.error(error);
    }
});

// Функция выхода из аккаунта
function logout() {
    localStorage.removeItem('token');
    showLoginPage();
}

// Загрузка списка регионов
async function populateRegionList() {
    try {
        const response = await fetch('https://apsnybillboard-production.up.railway.app/api/region');
        if (response.ok) {
            const regions = await response.json();
            const regionSelect = document.getElementById('regionId');
            regionSelect.innerHTML = regions
                .map(region => `<option value="${region.regionId}">${region.regionName}</option>`)
                .join('');
        } else {
            console.error('Failed to load regions:', response.statusText);
        }
    } catch (error) {
        console.error('Error loading regions:', error);
    }
}

// Загрузка списка категорий и подкатегорий
// Populate categories
async function populateCategoryList() {
    try {
        const response = await fetch('https://apsnybillboard-production.up.railway.app/api/category');
        const categories = await response.json();

        const categorySelect = document.getElementById('categoryId');
        categorySelect.innerHTML = '<option value="">Выберите категорию</option>';

        categories.forEach(category => {
            const option = document.createElement('option');
            option.value = category.id;
            option.textContent = category.categoryName;
            categorySelect.appendChild(option);
        });

        // Fetch subcategories when a category is selected
        categorySelect.addEventListener('change', async function() {
            const categoryId = categorySelect.value;
            await populateSubcategoryList(categoryId);
        });
    } catch (error) {
        console.error('Ошибка при загрузке категорий:', error);
    }
}

// Populate subcategories based on selected category
async function populateSubcategoryList(categoryId) {
    const subcategorySelect = document.getElementById('subcategoryId');
    subcategorySelect.innerHTML = '<option value="">Выберите подкатегорию</option>';

    if (!categoryId) return; // Exit if no category is selected

    try {
        const response = await fetch(`https://apsnybillboard-production.up.railway.app/api/category/${categoryId}/subcategory`);
        const subcategories = await response.json();

        subcategories.forEach(subcategory => {
            const option = document.createElement('option');
            option.value = subcategory.id;
            option.textContent = subcategory.subcategoryName;
            subcategorySelect.appendChild(option);
        });
    } catch (error) {
        console.error('Ошибка при загрузке подкатегорий:', error);
    }
}

    </script>

</body>
</html>
